universe:
  tickers:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - JPM
    - GOOGL
    - META
    - TSLA
    - AMD
    - AVGO
    - NFLX
    - CRM
    - ORCL
    - WMT
    - COST
    - HD
    - XOM
    - UNH
    - JNJ
    - CAT

data:
  price_provider: yfinance
  start_date: "2025-05-04"
  end_date: "2025-12-04"
  hourly_interval: "1h"
  daily_interval: "1d"
  adjustment: "splits_only"
  extended_hours: false

zone_engine:
  daily_vp_lookback_days: 20
  daily_vp_bins: 48
  weekly_vp_lookback_weeks: 12
  weekly_vp_bins: 24
  zone_expand_bp: 50
  hv_node_quantile_pct: 75
  merge_pct_bp: 60
  max_resistance_zones: 3
  max_support_zones: 3
  reaction_lookahead_bars: 5
  reaction_threshold_bp: 150
  min_touch_gap: 3
  zone_refresh_every_n_bars: 5
  min_history_bars: 30

boundary_tester:
  breakout_buffer_pct: 0.002
  probe_buffer_pct: 0.001
  lookahead_bars: 20
  success_move_pct: 0.03
  failure_reentry_bars: 5
  min_close_outside_zone: 2
  max_event_gap: 3
  use_atr_filter: false
  atr_multiple_success: 1.5
  atr_window: 14
  retest_buffer_pct: 0.002

output:
  dir: "outputs/boundary_tester"
